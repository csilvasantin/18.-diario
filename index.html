let activeFilter = "";

// Sort entries by date descending (most recent first)
entries.sort((a, b) => b.date.localeCompare(a.date));

function formatEntryTimes(entry) {
  const start = entry.startTime || "--:--";
  const update = entry.updateTime || "--:--";
  return "Inicio " + start + " · Update " + update;
}

// Build all entry divs
function buildEntries() {
  const container = document.getElementById("entries");
  container.innerHTML = "";
  entries.forEach((entry, i) => {
    const div = document.createElement("div");
    div.className = "entry";
    div.id = "entry-" + i;
    const times = formatEntryTimes(entry);
    const timesHtml = " <span class=\"entry-times\">" + times + "</span>";
    let html = "<h1>Diario - " + entry.title + timesHtml + "</h1>";
    entry.sections.forEach((s, si) => {
      const badgeClass = "author-badge" + (entry.author === "Yarig.ai" ? " yarig" : "");
      const badge = (si === 0 && entry.author)
        ? " <span class=\"" + badgeClass + "\">" + entry.author + "</span>"
        : "";
      html += "<h2>" + s.heading + badge + "</h2><ul>";
      const isPending = /pendiente/i.test(s.heading);
      s.items.forEach(item => {
        if (typeof item === "string") {
          html += "<li>" + item + "</li>";
        } else {
          const text = item.text || "";
          const canClose = isPending && entry.author === "Yarig.ai" && item.id;
          const btn = canClose
            ? ' <button class="yarig-task-btn" data-tid="' + item.id + '" title="Completar tarea">✓</button>'
            : "";
          html += "<li>" + text + btn + "</li>";
        }
      });
      html += "</ul>";
    });
    div.innerHTML = html;
    container.appendChild(div);
  });
}
buildEntries();

function getFiltered() {
  if (!activeFilter) return entries.map((_, i) => i);
  return entries.reduce((acc, e, i) => {
    if (e.author && e.author.toLowerCase().includes(activeFilter.toLowerCase())) acc.push(i);
    return acc;
  }, []);
}

function rebuildSelector(filtered, showIdx) {
  const selector = document.getElementById("entry-selector");
  selector.innerHTML = "";
  filtered.forEach(i => {
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = entries[i].date + "  —  " + formatEntryTimes(entries[i]);
    selector.appendChild(opt);
  });
  const target = filtered.includes(showIdx) ? showIdx : filtered[0];
  showEntry(target);
}

function showEntry(idx) {
  document.querySelectorAll(".entry").forEach(e => e.classList.remove("active"));
  const div = document.getElementById("entry-" + idx);
  if (div) div.classList.add("active");
  document.getElementById("entry-selector").value = String(idx);
}

document.getElementById("entry-selector").addEventListener("change", e => {
  showEntry(Number(e.target.value));
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    const filtered = getFiltered();
    rebuildSelector(filtered, filtered[0]);
  });
});

// Init: show all, most recent entry (entries are sorted descending)
rebuildSelector(getFiltered(), 0);

    if (sec <= 0) return null;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s2 = sec % 60;
    const pad = n => String(n).padStart(2, "0");
    return h ? (h + "h " + pad(m) + "m " + pad(s2) + "s") : (pad(m) + "m " + pad(s2) + "s");
  }
  function taskText(t) {
    const base = t.description || t.name || t.text || t.title || "";
    const dur = taskDuration(t);
    return dur ? (base + " (" + dur + ")") : base;
  }
  function parseScore(s) {
    if (typeof s === "number") return s;
    if (typeof s === "string") { const n = parseInt(s, 10); return Number.isFinite(n) ? n : null; }
    if (s && typeof s === "object") return s.score ?? s.points ?? null;
    return null;
  }
  function getYarigUrl() { return localStorage.getItem("yarig_url") || DEFAULT_URL; }
  function setBtnState(text, cls, disabled) {
    btn.textContent = text; btn.className = cls || ""; btn.disabled = !!disabled;
  }

  async function syncYarig() {
    hideCfg();
    const yarigUrl = getYarigUrl();
    setBtnState("⟳ importando…", "", true);

    let rawTasks = [];
    let score = null;
    let clocking = [];
    try {
      const [todayRes, scoreRes] = await Promise.all([
        fetch(yarigUrl + "/yarig/today",  { signal: AbortSignal.timeout(10000) }),
        fetch(yarigUrl + "/yarig/score",  { signal: AbortSignal.timeout(10000) }).catch(() => null),
      ]);
      if (!todayRes.ok) throw new Error("HTTP " + todayRes.status);
      const data = await todayRes.json();
      rawTasks = Array.isArray(data?.tasks) ? data.tasks : Array.isArray(data) ? data : [];
      clocking = Array.isArray(data?.clocking) ? data.clocking : [];
      if (scoreRes && scoreRes.ok) { try { score = parseScore(await scoreRes.json()); } catch {} }
      updateJourneyButton(clocking);
    } catch (e) {
      setBtnState("✗ sin conexión", "err", false);
      showCfg("No se pudo conectar con " + yarigUrl + " — cambia la URL si es necesario:");
      setTimeout(() => setBtnState("⟳ importar", "", false), 4000);
      return;
    }

    // Build entry
    const date = todayMadrid();
    const [y, m, d] = date.split("-");
    const title = parseInt(d) + " de " + MONTHS[parseInt(m) - 1] + " de " + y;
    const isDone = t => {
      const v = t.finished ?? t.completed ?? t.done;
      const finishedFlag = v === true || v === 1 || v === "1";
      if (!finishedFlag) return false;
      // Yarig mantiene finished='1' al reabrir una tarea (play de nuevo).
      // Cuando eso pasa start_time > end_time → tratarla como en proceso.
      if (t.start_time && t.end_time) {
        const s = new Date(String(t.start_time).replace(" ", "T"));
        const e = new Date(String(t.end_time).replace(" ", "T"));
        if (!isNaN(s) && !isNaN(e) && s > e) return false;
      }
      return true;
    };
    const completed = rawTasks.filter(isDone);
    const pending   = rawTasks.filter(t => !isDone(t));
    const toItem    = t => ({ id: String(t.id), text: taskText(t) });
    const total     = completed.length + pending.length;
    const ptsSuffix = Number.isFinite(score) ? " · " + score + " puntos" : "";
    const sections  = [];
    if (completed.length) sections.push({ heading: "Tareas completadas (" + completed.length + "/" + total + ")" + ptsSuffix, items: completed.map(toItem) });
    if (pending.length)   sections.push({ heading: "Tareas pendientes",  items: pending.map(toItem) });
    if (!sections.length) sections.push({ heading: "Actividad",          items: ["Sin tareas registradas hoy"] });

    const now = new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Madrid" });
    const newEntry = { date, title, author: "Yarig.ai", startTime: now, sections };
    const todayIdx = entries.findIndex(e => e.date === date);
    if (todayIdx !== -1) entries[todayIdx] = newEntry;
    else entries.unshift(newEntry);
    entries.sort((a, b) => b.date.localeCompare(a.date));

    buildEntries();
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    document.querySelector('[data-filter="Yarig.ai"]').classList.add("active");
    activeFilter = "Yarig.ai";
    const filtered = getFiltered();
    const newIdx = entries.findIndex(e => e.date === date);
    rebuildSelector(filtered, filtered.includes(newIdx) ? newIdx : filtered[0]);

    setBtnState("✓ importado", "ok", true);
    fetch(yarigUrl + "/yarig/diary/push", { method: "POST" }).catch(() => {});
    setTimeout(() => setBtnState("⟳ importar", "", false), 3000);
  }

  btn.addEventListener("click", syncYarig);

  // ── Jornada (clock-in / clock-out) ────────────────────────
  const journeyBtn = document.getElementById("yarig-journey");
  let journeyOpen = null; // null=unknown, true=open, false=closed

  function updateJourneyButton(clocking) {
    const list = Array.isArray(clocking) ? clocking.slice() : [];
    // Sort by datetime ascending and look at the last one.
    list.sort((a, b) => String(a.datetime || "").localeCompare(String(b.datetime || "")));
    const last = list[list.length - 1];
    // No clockings → closed. Last type=0 → open. Last type=1 → closed.
    journeyOpen = last ? String(last.type) === "0" : false;
    journeyBtn.style.display = "";
    journeyBtn.disabled = false;
    journeyBtn.classList.remove("err");
    if (journeyOpen) {
      journeyBtn.textContent = "⏹ cerrar jornada";
      journeyBtn.classList.add("open");
    } else {
      journeyBtn.textContent = "▶ abrir jornada";
      journeyBtn.classList.remove("open");
    }
  }

  journeyBtn.addEventListener("click", async () => {
    if (journeyOpen === null) { await syncYarig(); return; }
    const nextType = journeyOpen ? 1 : 0;
    const origText = journeyBtn.textContent;
    journeyBtn.disabled = true;
    journeyBtn.textContent = journeyOpen ? "⏹ cerrando…" : "▶ abriendo…";
    try {
      const res = await fetch(getYarigUrl() + "/yarig/clocking", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: nextType }),
        signal: AbortSignal.timeout(10000),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      await syncYarig();
    } catch (err) {
      journeyBtn.classList.add("err");
      journeyBtn.textContent = "✗ error";
      setTimeout(() => {
        journeyBtn.classList.remove("err");
        journeyBtn.textContent = origText;
        journeyBtn.disabled = false;
      }, 2500);
    }
  });

  // Kick off an initial lightweight state fetch so the journey button shows
  // the correct label on load without forcing a full import.
  (async () => {
    try {
      const res = await fetch(getYarigUrl() + "/yarig/today", { signal: AbortSignal.timeout(8000) });
      if (!res.ok) return;
      const data = await res.json();
      updateJourneyButton(Array.isArray(data?.clocking) ? data.clocking : []);
    } catch {}
  })();

  // Bidirectional: clicking the "Completar" button on a pending Yarig task
  // calls /yarig/task/close and re-syncs.
  document.getElementById("entries").addEventListener("click", async (e) => {
    const taskBtn = e.target.closest(".yarig-task-btn");
    if (!taskBtn) return;
    e.preventDefault();
    const tid = taskBtn.dataset.tid;
    if (!tid || taskBtn.disabled) return;
    taskBtn.disabled = true;
    const origText = taskBtn.textContent;
    taskBtn.textContent = "…";
    try {
      const res = await fetch(getYarigUrl() + "/yarig/task/close", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tid, finished: 1 }),
        signal: AbortSignal.timeout(10000),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      await syncYarig();
    } catch (err) {
      taskBtn.classList.add("err");
      taskBtn.textContent = "✗";
      setTimeout(() => {
        taskBtn.classList.remove("err");
        taskBtn.textContent = origText;
        taskBtn.disabled = false;
      }, 2500);
    }
  });
})();

(function startMatrixBackground() {
  const canvas = document.getElementById("matrix-canvas");
  const ctx = canvas.getContext("2d");
  const glyphs = "01アイウエオカキクケコサシスセソタチツテトナニヌネノABCDEFGHIJKLMNOPQRSTUVWXYZ{}[]<>/*+-=";
  const fontSize = 14;
  let columns = 0;
  let drops = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.max(1, Math.floor(canvas.width / fontSize));
    drops = Array.from({ length: columns }, () => Math.floor(Math.random() * canvas.height / fontSize));
  }

  function draw() {
    ctx.fillStyle = "rgba(2, 7, 3, 0.09)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + "px Share Tech Mono, monospace";

    for (let i = 0; i < columns; i++) {
      const char = glyphs[Math.floor(Math.random() * glyphs.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;

      ctx.fillStyle = Math.random() > 0.985 ? "#d8ffe3" : "#39ff6f";
      ctx.fillText(char, x, y);

      if (y > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i] += 1;
    }
  }

  resize();
  window.addEventListener("resize", resize);
  setInterval(draw, 48);
})();
</script>
