    min-height: 100vh;
    letter-spacing: 0.02em;
    position: relative;
    overflow-x: hidden;

  body::before {

    position: fixed;
    inset: 0;
    pointer-events: none;
    background:

    background-size: 100% 4px;
    opacity: 0.08;
    z-index: 1;
  }

  #matrix-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

    position: relative; z-index: 2;
  }

    font-size: 1.6rem;

    text-transform: uppercase;

    padding: 12px 20px; font-size: 1rem; border: 1px solid var(--matrix-border); border-radius: 10px;

    letter-spacing: 0.12em;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35), 0 0 20px rgba(57, 255, 111, 0.12);

  #login button:hover { filter: brightness(1.08); }
  #error { color: var(--matrix-danger); font-size: 0.9rem; min-height: 1.2em; }

  #diary {
    display: none;
    max-width: 920px;
    margin: 0 auto;
    padding: 40px 20px 56px;
    position: relative;
    z-index: 2;

    margin-bottom: 32px;
    padding: 18px 18px 20px;
    border: 1px solid var(--matrix-border);
    border-radius: 18px;
    background: var(--matrix-panel);
    backdrop-filter: blur(8px);
    box-shadow: var(--matrix-shadow);
  }
  #diary nav h1 {
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: var(--matrix-bright);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    text-shadow: 0 0 18px rgba(57, 255, 111, 0.18);

    width: min(320px, 100%);

    font-size: 0.95rem;
    border: 1px solid var(--matrix-border);
    border-radius: 10px;
    background: rgba(0, 16, 8, 0.92);
    color: var(--matrix-bright-soft);
    box-shadow: inset 0 0 20px rgba(57, 255, 111, 0.05);

  #entry-selector:focus { outline: none; border-color: var(--matrix-bright); box-shadow: 0 0 0 4px rgba(57, 255, 111, 0.08); }

  .entry.active {
    display: block;
    background: var(--matrix-panel-strong);
    border: 1px solid var(--matrix-border);
    border-radius: 22px;
    padding: 28px 24px;
    box-shadow: var(--matrix-shadow);
    animation: panel-in 220ms ease-out;
  }
  .entry h1 {
    font-size: 1.7rem;
    margin-bottom: 24px;
    color: var(--matrix-bright);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px rgba(57, 255, 111, 0.18);
  }
  .entry h2 {
    font-size: 1.08rem;
    margin: 26px 0 12px;
    color: var(--matrix-bright-soft);

    padding-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .entry ul { padding-left: 24px; margin-bottom: 12px; }
  .entry li { margin-bottom: 10px; line-height: 1.7; color: var(--matrix-text); }
  .entry li::marker { color: var(--matrix-bright); }
  .entry a { color: var(--matrix-bright); }
  .entry code {
    background: var(--matrix-code);

    border-radius: 6px;
    font-size: 0.9em;
    color: var(--matrix-bright);

    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }

    #diary { padding: 24px 14px 40px; }

    .entry.active { padding: 22px 16px; border-radius: 18px; }
    .entry h1 { font-size: 1.35rem; }
  }
</style>
</head>

function unlock() {
  const pwd = document.getElementById("pwd").value;
  if (pwd === atob("Tm9tZWFjdWVyZDA=")) {
    openDiary();
  } else {
    document.getElementById("error").textContent = "Contraseña incorrecta";
  }
}

function openDiary() {
  document.getElementById("login").style.display = "none";
  document.getElementById("diary").style.display = "block";
  renderDiary();
}

document.getElementById("pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

if (isLocalAccess()) {
  openDiary();
}

function renderDiary() {
  const selector = document.getElementById("entry-selector");
  const container = document.getElementById("entries");

  entries.forEach((entry, i) => {
    const option = document.createElement("option");
    option.value = String(i);
    option.textContent = entry.date;
    selector.appendChild(option);

    // Entry
    const div = document.createElement("div");
    div.className = "entry";
    div.id = "entry-" + i;

    let html = "<h1>Diario - " + entry.title + "</h1>";
    entry.sections.forEach(s => {
      html += "<h2>" + s.heading + "</h2><ul>";
      s.items.forEach(item => { html += "<li>" + item + "</li>"; });
      html += "</ul>";
    });

    div.innerHTML = html;
    container.appendChild(div);
  });

  selector.addEventListener("change", (event) => {
    showEntry(Number(event.target.value));
  });

  showEntry(entries.length - 1);
}

function showEntry(idx) {
  document.querySelectorAll(".entry").forEach(e => e.classList.remove("active"));
  document.getElementById("entry-" + idx).classList.add("active");
  document.getElementById("entry-selector").value = String(idx);
}

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.max(1, Math.floor(canvas.width / fontSize));
    drops = Array.from({ length: columns }, () => Math.floor(Math.random() * canvas.height / fontSize));
  }

  function draw() {
    ctx.fillStyle = "rgba(2, 7, 3, 0.09)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + "px Share Tech Mono, monospace";

    for (let i = 0; i < columns; i++) {
      const char = glyphs[Math.floor(Math.random() * glyphs.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;

      ctx.fillStyle = Math.random() > 0.985 ? "#d8ffe3" : "#39ff6f";
      ctx.fillText(char, x, y);

      if (y > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i] += 1;
    }
  }

  resize();
  window.addEventListener("resize", resize);
  setInterval(draw, 48);
})();
</script>

</body>
</html>
