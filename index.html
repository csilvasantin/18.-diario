function unlock() {
  const pwd = document.getElementById("pwd").value;
  if (pwd === atob("Tm9tZWFjdWVyZDA=")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("diary").style.display = "block";
    renderDiary();
  } else {
    document.getElementById("error").textContent = "Contraseña incorrecta";
  }
}

document.getElementById("pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") unlock();
});

function renderDiary() {
  const nav = document.getElementById("nav-links");
  const container = document.getElementById("entries");

  entries.forEach((entry, i) => {
    // Nav link
    const a = document.createElement("a");
    a.href = "#";
    a.textContent = entry.date;
    a.onclick = (e) => { e.preventDefault(); showEntry(i); };
    nav.appendChild(a);

    // Entry
    const div = document.createElement("div");
    div.className = "entry";
    div.id = "entry-" + i;

    let html = "<h1>Diario - " + entry.title + "</h1>";
    entry.sections.forEach(s => {
      html += "<h2>" + s.heading + "</h2><ul>";
      s.items.forEach(item => { html += "<li>" + item + "</li>"; });
      html += "</ul>";
    });

    div.innerHTML = html;
    container.appendChild(div);
  });

  showEntry(entries.length - 1);
}

function showEntry(idx) {
  document.querySelectorAll(".entry").forEach(e => e.classList.remove("active"));
  document.querySelectorAll("#nav-links a").forEach(a => a.classList.remove("active"));
  document.getElementById("entry-" + idx).classList.add("active");
  document.querySelectorAll("#nav-links a")[idx].classList.add("active");
}
