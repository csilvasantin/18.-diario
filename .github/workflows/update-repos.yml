name: Actualizar tabla de repos

on:
  schedule:
    - cron: '0 5 * * *'   # cada día a las 5am UTC (7am CEST)
  workflow_dispatch:        # también manual desde GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerar repos.html
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, datetime

          TOKEN = os.environ.get('GH_TOKEN', '')
          HEADERS = {'Authorization': f'token {TOKEN}', 'User-Agent': 'diario-bot'}
          TODAY = datetime.date.today().isoformat()

          def api(url):
              req = urllib.request.Request(url, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()), r.headers.get('Link','')
              except:
                  return None, ''

          def api_json(url):
              d, _ = api(url); return d or []

          # Fechas de todos los repos (ISO completo: 2026-04-16T21:22:15Z)
          repos = api_json('https://api.github.com/users/csilvasantin/repos?per_page=100&sort=updated')
          fechas = {r['name']: r['updated_at'] for r in repos}

          def total_commits(repo):
              import re
              _, link = api(f'https://api.github.com/repos/csilvasantin/{repo}/commits?per_page=1')
              if 'rel="last"' in link:
                  m = re.search(r'page=(\d+)>; rel="last"', link)
                  return int(m.group(1)) if m else 1
              return 1

          def recent_pushes(repo):
              since = (datetime.datetime.utcnow() - datetime.timedelta(days=7)).strftime('%Y-%m-%dT%H:%M:%SZ')
              d = api_json(f'https://api.github.com/repos/csilvasantin/{repo}/commits?since={since}&per_page=100')
              return len(d) if isinstance(d, list) else 0

          def get_clones(repo):
              d, _ = api(f'https://api.github.com/repos/csilvasantin/{repo}/traffic/clones')
              return d.get('count', 0) if d else 0

          def detect_llms(repo):
              """Escanea últimos 30 commits buscando marcadores de Claude/Codex.
              Devuelve set con 'Claude', 'Codex', ambos, o vacío."""
              d = api_json(f'https://api.github.com/repos/csilvasantin/{repo}/commits?per_page=30')
              if not isinstance(d, list): return set()
              llms = set()
              for c in d:
                  commit = c.get('commit') or {}
                  msg = (commit.get('message') or '')
                  msg_low = msg.lower()
                  author = commit.get('author') or {}
                  email = (author.get('email') or '').lower()
                  # Claude: firma Co-Authored-By, email anthropic, marcador [Claude]
                  if ('co-authored-by: claude' in msg_low
                      or '[claude]' in msg_low
                      or 'update claude' in msg_low
                      or 'noreply@anthropic.com' == email):
                      llms.add('Claude')
                  # Codex: marcador [Codex] o docs: Update Codex
                  if ('[codex]' in msg_low
                      or 'update codex' in msg_low):
                      llms.add('Codex')
              return llms

          # Lista de proyectos: (num, repo, url_publica)
          PROYECTOS = [
              ( 0, '00.-EmpezarTrabajo',          'https://csilvasantin.github.io/00.-EmpezarTrabajo/'),
              ( 1, '01.-AdmiraXperience-Game',    'https://csilvasantin.github.io/01.-AdmiraXperience-Game/'),
              ( 2, '02.-YarigTelegram',           'https://csilvasantin.github.io/02.-YarigTelegram/'),
              ( 3, '03.-ControlCodexClaude',      'https://csilvasantin.github.io/03.-ControlCodexClaude/'),
              (10, '10.-Yarig.aiTheGame',         None),
              (15, '15.-Control-de-Tienda',       'https://csilvasantin.github.io/15.-Control-de-Tienda/'),
              (16, '16.-pulpo',                   'https://csilvasantin.github.io/16.-pulpo/'),
              (17, '17.-Memorizer',               'https://csilvasantin.github.io/17.-Memorizer/'),
              (18, '18.-diario',                  'https://csilvasantin.github.io/18.-diario/'),
              (20, '20.-ClaudeBot',               'https://csilvasantin.github.io/20.-ClaudeBot/'),
              (21, '21.-CodexBot',                'https://csilvasantin.github.io/21.-CodexBot/'),
              (24, '24.-Emulador-de-Spectrum',    'https://csilvasantin.github.io/24.-Emulador-de-Spectrum/'),
              (29, '29.-AenaJones',               'https://csilvasantin.github.io/29.-AenaJones/'),
              (30, '30.-AenaMallorca',            'https://csilvasantin.github.io/30.-AenaMallorca/'),
              (31, 'csilvasantin.github.io',      'https://csilvasantin.github.io/'),
              (32, '32.-ConsejoAdmiraNextGame',   'https://csilvasantin.github.io/32.-ConsejoAdmiraNextGame/'),
              (33, '33.-AdmiraGrok',              'https://csilvasantin.github.io/33.-AdmiraGrok/'),
              (34, '34.-signage-editor',          None),
              (35, '35.-signage-editor-final',    'https://csilvasantin.github.io/35.-signage-editor-final/'),
          ]

          def fila(num, repo, url):
              iso = fechas.get(repo, '')
              fecha = iso[:10] if iso else '—'
              hora  = iso[11:16] if len(iso) >= 16 else ''
              cls_fecha = 'fecha today' if fecha == TODAY else 'fecha'
              num_fmt = f'{num:02d}'
              if url:
                  short = url.replace('https://','')
                  td_url = f'<td class="url"><a href="{url}" target="_blank">{short}</a></td>'
                  # Thumbnail abre modal con iframe del Pages en vivo
                  td_thumb = (f'<td class="thumb"><button type="button" class="thumb-btn" '
                              f'data-preview-url="{url}" data-preview-repo="{repo}" '
                              f'title="Abrir vista previa en vivo">'
                              f'<img src="https://image.thum.io/get/width/160/crop/100/noanimate/{url}" '
                              f'alt="{repo}" loading="lazy"/>'
                              f'<span class="thumb-eye">👁</span>'
                              f'</button></td>')
              else:
                  td_url = '<td class="url none">—</td>'
                  # Sin Pages: el thumbnail solo enlaza a GitHub (nueva pestaña)
                  td_thumb = (f'<td class="thumb"><a href="https://github.com/csilvasantin/{repo}" target="_blank" '
                              f'title="Abrir en GitHub (sin GitHub Pages)">'
                              f'<img src="https://opengraph.githubassets.com/1/csilvasantin/{repo}" '
                              f'alt="{repo}" loading="lazy"/></a></td>')
              commits = total_commits(repo)
              push7d  = recent_pushes(repo)
              clones  = get_clones(repo)
              llms    = detect_llms(repo)
              td_commits  = f'<td class="commits">{commits}</td>'
              td_activity = (f'<td class="activity">'
                             f'<span class="push">↑{push7d}</span> '
                             f'<span class="pull">↓{clones}</span>'
                             f'</td>')
              # Si no se detecta Claude ni Codex, asumimos Gemini CLI
              if not llms: llms.add('Gemini CLI')
              badges = []
              if 'Claude'     in llms: badges.append('<span class="llm-badge llm-claude">Claude</span>')
              if 'Codex'      in llms: badges.append('<span class="llm-badge llm-codex">Codex</span>')
              if 'Gemini CLI' in llms: badges.append('<span class="llm-badge llm-gemini">Gemini CLI</span>')
              td_llm = f'<td class="llm">{" ".join(badges)}</td>'
              td_fecha = (f'<td class="{cls_fecha}">{fecha}'
                          + (f'<span class="hora">{hora}</span>' if hora else '')
                          + '</td>')
              return (
                  f'        <tr>'
                  f'<td class="num">{num_fmt}</td>'
                  f'{td_thumb}'
                  f'<td class="repo"><a href="https://github.com/csilvasantin/{repo}" target="_blank">{repo}</a></td>'
                  f'{td_fecha}'
                  f'{td_llm}'
                  f'{td_url}'
                  f'{td_commits}'
                  f'{td_activity}'
                  f'</tr>'
              )

          filas = '\n'.join(fila(*p) for p in PROYECTOS)
          n = len(PROYECTOS)

          html = f'''<!DOCTYPE html>
          <html lang="es">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Repos — ADmiraNext</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
          <style>
            * {{ margin:0; padding:0; box-sizing:border-box; }}
            :root {{
              --bg:#020703; --panel:rgba(6,19,10,0.88); --border:rgba(0,255,110,0.18);
              --text:#b7f7c7; --muted:#5ca772; --bright:#39ff6f;
            }}
            body {{
              font-family:'Share Tech Mono',ui-monospace,monospace;
              background: radial-gradient(circle at top,rgba(30,100,45,0.2),transparent 32%),
                          linear-gradient(180deg,#04110a 0%,#020703 100%);
              color:var(--text); min-height:100vh; letter-spacing:0.02em; overflow-x:hidden;
            }}
            body::before {{
              content:""; position:fixed; inset:0; pointer-events:none;
              background:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);
              background-size:100% 4px; opacity:0.08; z-index:0;
            }}
            #matrix-canvas {{ position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }}
            #app {{ position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:28px 20px 60px; }}
            nav {{
              display:flex; align-items:center; gap:20px;
              background:var(--panel); border:1px solid var(--border); border-radius:14px;
              padding:14px 20px; margin-bottom:20px; backdrop-filter:blur(8px);
            }}
            nav h1 {{ font-size:1rem; color:var(--bright); letter-spacing:3px; text-transform:uppercase; white-space:nowrap; }}
            nav .sep {{ color:var(--muted); }}
            nav a {{ color:var(--muted); text-decoration:none; font-size:0.82rem; transition:color 0.15s; }}
            nav a:hover {{ color:var(--bright); }}
            .meta {{ font-size:0.72rem; color:var(--muted); margin-left:auto; white-space:nowrap; }}
            .table-wrap {{
              background:var(--panel); border:1px solid var(--border);
              border-radius:14px; overflow:hidden; backdrop-filter:blur(8px);
            }}
            table {{ width:100%; border-collapse:collapse; font-size:0.8rem; }}
            thead th {{
              background:rgba(0,0,0,0.3); color:var(--bright);
              border-bottom:1px solid var(--border); padding:0; white-space:nowrap; user-select:none;
            }}
            .th-label {{ display:flex; align-items:center; gap:6px; padding:10px 14px 5px; cursor:pointer; transition:color 0.15s; }}
            .th-label:hover {{ color:#fff; }}
            .sort-icon {{ font-size:0.6rem; color:rgba(0,255,110,0.3); }}
            th.asc  .sort-icon::after {{ content:'▲'; color:var(--bright); }}
            th.desc .sort-icon::after {{ content:'▼'; color:var(--bright); }}
            th:not(.asc):not(.desc) .sort-icon::after {{ content:'⇅'; }}
            tbody tr {{ border-bottom:1px solid rgba(0,255,110,0.06); transition:background 0.1s; }}
            tbody tr:last-child {{ border-bottom:none; }}
            tbody tr:nth-child(even) {{ background:rgba(0,255,110,0.025); }}
            tbody tr:hover {{ background:rgba(0,255,110,0.08) !important; }}
            tbody td {{ padding:8px 14px; vertical-align:middle; }}
            td.num {{ color:var(--bright); font-size:0.85rem; font-weight:bold; text-align:center; width:54px; }}
            td.repo a {{ color:#88ccff; text-decoration:none; transition:color 0.15s; }}
            td.repo a:hover {{ color:#fff; text-decoration:underline; }}
            td.fecha {{ color:var(--muted); text-align:center; font-size:0.75rem; white-space:nowrap; line-height:1.4; }}
            td.fecha.today {{ color:var(--bright); }}
            td.fecha .hora {{ display:block; font-size:0.65rem; color:rgba(92,167,114,0.6); letter-spacing:0.04em; }}
            td.fecha.today .hora {{ color:rgba(57,255,111,0.7); }}
            td.llm {{ text-align:center; font-size:0.75rem; white-space:nowrap; line-height:1.6; }}
            th[data-col="4"] .th-label {{ justify-content:center; }}
            .llm-badge {{ display:inline-block; padding:2px 8px; border-radius:999px; font-size:0.62rem; letter-spacing:0.06em; text-transform:uppercase; }}
            .llm-claude {{ background:rgba(57,255,111,0.15); color:var(--bright); border:1px solid rgba(57,255,111,0.3); }}
            .llm-codex  {{ background:rgba(136,204,255,0.12); color:#88ccff; border:1px solid rgba(136,204,255,0.3); }}
            .llm-gemini {{ background:rgba(236,201,75,0.14); color:#ecc94b; border:1px solid rgba(236,201,75,0.3); }}
            td.url {{ font-size:0.72rem; }}
            td.url a {{ color:#aaffcc; text-decoration:none; transition:color 0.15s; }}
            td.url a:hover {{ color:#fff; text-decoration:underline; }}
            td.url.none {{ color:rgba(92,167,114,0.3); text-align:center; }}
            td.thumb {{ width:88px; padding:4px 8px; vertical-align:middle; }}
            td.thumb img {{ width:80px; height:50px; object-fit:cover; object-position:top left; border-radius:5px; border:1px solid rgba(0,255,110,0.15); display:block; background:#031a09; transition:transform 0.15s; }}
            td.thumb img:hover {{ transform:scale(1.05); border-color:rgba(0,255,110,0.4); }}
            td.thumb .thumb-btn {{ position:relative; display:block; background:none; border:0; padding:0; cursor:pointer; width:80px; }}
            td.thumb .thumb-btn .thumb-eye {{ position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7); color:var(--bright); font-size:0.65rem; padding:1px 4px; border-radius:3px; opacity:0; transition:opacity 0.15s; pointer-events:none; }}
            td.thumb .thumb-btn:hover .thumb-eye {{ opacity:1; }}
            td.thumb a {{ display:block; }}

            /* Modal de vista previa en iframe */
            .preview-modal {{ position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:999; display:flex; flex-direction:column; padding:16px; backdrop-filter:blur(4px); }}
            .preview-modal.hidden {{ display:none; }}
            .preview-modal .pm-head {{ display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:10px; }}
            .preview-modal .pm-title {{ color:var(--bright); font-size:0.85rem; letter-spacing:2px; text-transform:uppercase; }}
            .preview-modal .pm-url {{ color:var(--muted); font-size:0.72rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }}
            .preview-modal .pm-url a {{ color:#aaffcc; text-decoration:none; }}
            .preview-modal .pm-url a:hover {{ color:#fff; text-decoration:underline; }}
            .preview-modal .pm-btn {{ background:rgba(0,0,0,0.4); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-family:inherit; font-size:0.72rem; cursor:pointer; transition:all 0.15s; white-space:nowrap; }}
            .preview-modal .pm-btn:hover {{ background:rgba(0,255,110,0.12); color:var(--bright); border-color:var(--bright); }}
            .preview-modal .pm-body {{ flex:1; background:#000; border:1px solid var(--border); border-radius:10px; overflow:hidden; position:relative; }}
            .preview-modal iframe {{ width:100%; height:100%; border:0; background:#fff; }}
            .preview-modal .pm-fallback {{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:20px; text-align:center; }}
            .preview-modal .pm-fallback.show {{ display:flex; }}
            .preview-modal .pm-fallback img {{ max-width:90%; max-height:70vh; border:1px solid var(--border); border-radius:6px; }}
            .preview-modal .pm-fallback p {{ color:var(--muted); font-size:0.8rem; }}
            td.commits {{ color:var(--muted); text-align:center; font-size:0.78rem; font-variant-numeric:tabular-nums; }}
            td.activity {{ text-align:center; font-size:0.72rem; white-space:nowrap; color:var(--muted); }}
            td.activity .push {{ color:#88ccff; }}
            td.activity .pull {{ color:#aaffcc; }}
            .count {{ font-size:0.72rem; color:var(--muted); text-align:right; padding:8px 14px; border-top:1px solid var(--border); }}
            @media (max-width:700px) {{ td.thumb, thead th:nth-child(2) {{ display:none; }} }}
            @media (max-width:1100px) {{ td.commits, thead th:nth-child(7) {{ display:none; }} }}
            @media (max-width:900px) {{ td.activity, thead th:nth-child(8) {{ display:none; }} }}
            @media (max-width:600px) {{ td.url, thead th:nth-child(6) {{ display:none; }} }}
          </style>
          </head>
          <body>
          <canvas id="matrix-canvas" aria-hidden="true"></canvas>
          <div id="app">
            <nav>
              <h1>Repos ADmiraNext</h1>
              <span class="sep">/</span>
              <a href="index.html">← diario</a>
              <span class="meta">generado {TODAY}</span>
            </nav>
            <div class="table-wrap">
              <table id="t">
                <thead>
                  <tr id="headers">
                    <th data-col="0"><div class="th-label">#<span class="sort-icon"></span></div></th>
                    <th data-col="1" style="width:88px"><div class="th-label">Vista<span class="sort-icon"></span></div></th>
                    <th data-col="2"><div class="th-label">Repo<span class="sort-icon"></span></div></th>
                    <th data-col="3"><div class="th-label">Actualización<span class="sort-icon"></span></div></th>
                    <th data-col="4"><div class="th-label">LLM<span class="sort-icon"></span></div></th>
                    <th data-col="5"><div class="th-label">URL p&#250;blica<span class="sort-icon"></span></div></th>
                    <th data-col="6"><div class="th-label">Commits<span class="sort-icon"></span></div></th>
                    <th data-col="7"><div class="th-label">&#x2191;7d / &#x2193;14d<span class="sort-icon"></span></div></th>
                  </tr>
                </thead>
                <tbody id="tbody">
          {filas}
                </tbody>
              </table>
              <div class="count" id="count">{n} repos</div>
            </div>
          </div>
          <div id="preview-modal" class="preview-modal hidden" role="dialog" aria-label="Vista previa del repositorio">
            <div class="pm-head">
              <span class="pm-title" id="pm-title">Vista previa</span>
              <span class="pm-url" id="pm-url"></span>
              <button class="pm-btn" id="pm-open" type="button">↗ Nueva pestaña</button>
              <button class="pm-btn" id="pm-screenshot" type="button">🖼 Screenshot</button>
              <button class="pm-btn" id="pm-close" type="button" aria-label="Cerrar">✕ Cerrar</button>
            </div>
            <div class="pm-body">
              <iframe id="pm-iframe" title="Preview" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
              <div class="pm-fallback" id="pm-fallback">
                <img id="pm-fallback-img" alt="Screenshot"/>
                <p>Este sitio bloquea la vista previa embebida.<br/>Abriendo screenshot estático. Usa <strong>Nueva pestaña</strong> para verlo en vivo.</p>
              </div>
            </div>
          </div>
          <script>
            (function(){{
              const canvas=document.getElementById('matrix-canvas'),ctx=canvas.getContext('2d');
              const glyphs="01アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ{{}}[]<>/*+-=";
              const fs=14; let cols=0,drops=[];
              function resize(){{canvas.width=window.innerWidth;canvas.height=window.innerHeight;cols=Math.floor(canvas.width/fs);drops=Array(cols).fill(1);}}
              function draw(){{ctx.fillStyle='rgba(2,7,3,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#39ff6f';ctx.font=fs+'px Share Tech Mono,monospace';drops.forEach((y,i)=>{{const ch=glyphs[Math.floor(Math.random()*glyphs.length)];ctx.fillText(ch,i*fs,y*fs);if(y*fs>canvas.height&&Math.random()>0.975)drops[i]=0;drops[i]++;}});}}
              resize(); window.addEventListener('resize',resize); setInterval(draw,50);
            }})();
            const tbody=document.getElementById('tbody'),headers=document.querySelectorAll('#headers th');
            let sCol=-1,sDir=1;
            headers.forEach(th=>{{
              th.querySelector('.th-label').addEventListener('click',()=>{{
                const col=+th.dataset.col; sDir=(sCol===col)?sDir*-1:1; sCol=col;
                headers.forEach(h=>h.classList.remove('asc','desc'));
                th.classList.add(sDir===1?'asc':'desc');
                [...tbody.querySelectorAll('tr')].sort((a,b)=>a.cells[col].textContent.trim().localeCompare(b.cells[col].textContent.trim(),'es',{{numeric:true}})*sDir).forEach(r=>tbody.appendChild(r));
              }});
            }});

            // Modal de vista previa
            const pm = document.getElementById('preview-modal');
            const pmTitle = document.getElementById('pm-title');
            const pmUrl = document.getElementById('pm-url');
            const pmIframe = document.getElementById('pm-iframe');
            const pmFallback = document.getElementById('pm-fallback');
            const pmFallbackImg = document.getElementById('pm-fallback-img');
            const pmOpen = document.getElementById('pm-open');
            const pmScreenshot = document.getElementById('pm-screenshot');
            const pmClose = document.getElementById('pm-close');
            let pmCurrentUrl = '';
            let pmFallbackTimer = null;

            let pmIframeLoaded = false;

            function openPreview(url, repo){{
              pmCurrentUrl = url;
              pmIframeLoaded = false;
              pmTitle.textContent = repo || 'Vista previa';
              pmUrl.innerHTML = '<a href="'+url+'" target="_blank" rel="noopener">'+url.replace(/^https?:\/\//,'')+'</a>';
              pmFallback.classList.remove('show');
              pmFallbackImg.src = '';
              pmIframe.src = url;
              pm.classList.remove('hidden');
              document.body.style.overflow = 'hidden';
              // Si el iframe no dispara 'load' en 6s (probablemente X-Frame-Options bloqueó), caer a screenshot
              clearTimeout(pmFallbackTimer);
              pmFallbackTimer = setTimeout(()=>{{
                if (!pmIframeLoaded) showFallback();
              }}, 6000);
            }}

            function showFallback(){{
              if (!pmCurrentUrl) return;
              pmFallbackImg.src = 'https://image.thum.io/get/width/1280/crop/800/noanimate/' + pmCurrentUrl;
              pmFallback.classList.add('show');
            }}

            function closePreview(){{
              pm.classList.add('hidden');
              pmIframe.src = 'about:blank';
              pmFallback.classList.remove('show');
              pmFallbackImg.src = '';
              document.body.style.overflow = '';
              clearTimeout(pmFallbackTimer);
              pmCurrentUrl = '';
            }}

            pmClose.addEventListener('click', closePreview);
            pm.addEventListener('click', e => {{ if (e.target === pm) closePreview(); }});
            document.addEventListener('keydown', e => {{ if (e.key === 'Escape' && !pm.classList.contains('hidden')) closePreview(); }});
            pmOpen.addEventListener('click', () => {{ if (pmCurrentUrl) window.open(pmCurrentUrl, '_blank', 'noopener'); }});
            pmScreenshot.addEventListener('click', showFallback);
            pmIframe.addEventListener('error', showFallback);
            pmIframe.addEventListener('load', () => {{
              pmIframeLoaded = true;
              clearTimeout(pmFallbackTimer);
            }});

            // Delegación: cualquier .thumb-btn abre la vista previa
            document.getElementById('tbody').addEventListener('click', e => {{
              const btn = e.target.closest('.thumb-btn');
              if (!btn) return;
              e.preventDefault();
              openPreview(btn.dataset.previewUrl, btn.dataset.previewRepo);
            }});
          </script>
          </body>
          </html>'''

          # Dedent
          import textwrap
          html = textwrap.dedent(html)

          with open('repos.html', 'w') as f:
              f.write(html)

          print(f'repos.html generado — {n} proyectos — {TODAY}')
          PYEOF

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.html
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "chore: actualizar repos.html $(date +%Y-%m-%d) [skip ci]"
            git push
          )
